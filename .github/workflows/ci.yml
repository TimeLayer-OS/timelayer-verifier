name: ci

# Lightweight test gate on every push/PR to main. Linux only — enough to catch
# breakage before a release tag runs the full cross-OS build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --workspace
