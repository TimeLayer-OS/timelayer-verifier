name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: timelayer-verifier-linux-amd64
            ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: timelayer-verifier-macos-arm64
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: timelayer-verifier-macos-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: timelayer-verifier-windows-amd64.exe
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/timelayer-verifier ${{ matrix.artifact }}

      - name: Copy binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/timelayer-verifier.exe ${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
